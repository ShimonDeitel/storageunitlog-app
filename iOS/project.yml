name: StorageUnitLog
options:
  bundleIdPrefix: com.shimondeitel.storageunitlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  StorageUnitLog:
    type: application
    platform: iOS
    sources:
      - path: StorageUnitLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.storageunitlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: StorageUnitLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  StorageUnitLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: StorageUnitLogTests
      - path: StorageUnitLog.storekit
    dependencies:
      - target: StorageUnitLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.storageunitlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  StorageUnitLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: StorageUnitLogUITests
    dependencies:
      - target: StorageUnitLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.storageunitlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  StorageUnitLog:
    build:
      targets:
        StorageUnitLog: all
        StorageUnitLogTests: [test]
        StorageUnitLogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: StorageUnitLog.storekit
    test:
      config: Debug
      storeKitConfiguration: StorageUnitLog.storekit
      targets:
        - StorageUnitLogTests
        - StorageUnitLogUITests
    archive:
      config: Release
